<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>

<body>
	<script>

		let str = '{"title":"Conference","date":"2022-03-08Т12:00:00.000Z"}';
		let obj = JSON.parse(str, function (key, value) {
			if (key == 'date') return new Date(value);
			return value;
		});
		alert(obj.date.toDateString());
	</script>
</body>
